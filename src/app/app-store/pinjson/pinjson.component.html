<app-sub-window [title]="'PIN MAP'" [winBtns]="['minimize', 'maximize', 'close']">
  <div class="pinjson-container">
    @if(isLoading) {
    <div class="pinjson-loading">
      <i class="fa-light fa-spinner fa-spin"></i>
      <span>加载中...</span>
    </div>
    }
    @if(showEmptyState) {
    <div class="pinjson-empty-state">
      <i class="fa-light fa-inbox"></i>
      <span>加载失败</span>
    </div>
    }
    <iframe
      class="pinjson-iframe"
      [src]="iframeSrc"
      (load)="onIframeLoad($event)"
      (error)="handleLoadError()"
      [style.display]="isLoading || showEmptyState ? 'none' : 'block'"
      title="Pin JSON Viewer"
    ></iframe>
  </div>
</app-sub-window>
