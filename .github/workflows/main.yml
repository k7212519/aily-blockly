name: CI & CD Pipeline

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  # 任务 1：Windows 客户端构建 (新增，用于向 SignPath 证明构建能力)
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci
          cd electron && npm ci

      - name: Compile Windows Executable
        run: |
          npm run build -- --win
        env:
          NODE_ENV: production

      # --- SignPath 预留位 (申请时给审核员看的重点) ---
      # - name: Sign with SignPath
      #   uses: signpath/github-action@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     ... (待申请通过后完善)
      
      - name: Archive Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: dist/aily-blockly/ # 包含所有输出：exe, yml 等

  # 任务 2：macOS 客户端构建
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci
          cd electron && npm ci

      # --- 导入代码签名证书到 Keychain ---
      - name: Import Codesign Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT }}
          p12-password: ${{ secrets.APPLE_SIGNING_PASSWORD }}

      - name: Verify Certificate Import
        run: |
          echo "Available signing identities:"
          security find-identity -v -p codesigning
          echo ""
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1)
          if [ -z "$IDENTITY" ]; then
            echo "❌ No Developer ID Application certificate found!"
            exit 1
          else
            echo "✅ Found: $IDENTITY"
          fi

      # --- 构建 + 签名 + 公证（和本地 Mac 一样） ---
      - name: Build, Sign & Notarize
        run: |
          npm run build -- --mac
        env:
          NODE_ENV: production
          # electron-builder 签名配置
          CSC_LINK: ${{ secrets.APPLE_SIGNING_CERT }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_SIGNING_PASSWORD }}
          # Apple 公证配置（electron-builder 要求的变量名）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # --- 如果 electron-builder 公证失败，手动公证 ---
      - name: Manual Notarization (if needed)
        if: always()
        run: |
          DMG_PATH=$(find dist/aily-blockly -name "*.dmg" -type f | head -n 1)
          
          if [ -z "$DMG_PATH" ]; then
            echo "❌ DMG not found!"
            exit 1
          fi
          
          echo "Checking if already notarized..."
          if xcrun stapler validate "$DMG_PATH" 2>/dev/null; then
            echo "✅ Already notarized and stapled!"
            exit 0
          fi
          
          echo "Submitting for notarization: $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait \
            --timeout 30m
          
          echo "Stapling..."
          xcrun stapler staple "$DMG_PATH"
          echo "✅ Notarization completed!"

      - name: Final Verification
        run: |
          DMG_PATH=$(find dist/aily-blockly -name "*.dmg" -type f | head -n 1)
          echo "=== Verification ==="
          xcrun stapler validate "$DMG_PATH" && echo "✅ Notarized" || echo "⚠️ Not notarized"
      
      - name: Archive macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: dist/aily-blockly/

  # 任务 3：发布到 GitHub Release
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: ./release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ./release/*.exe
            ./release/*.dmg
          draft: false
          prerelease: false
          update_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 任务 4：上传文件到服务器（与Release并行执行）
  upload-to-server:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: ./artifacts/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: ./artifacts/macos

      - name: Upload files to Server (non-yml files first, yml files last)
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          # 安装sshpass用于密码认证
          sudo apt-get update && sudo apt-get install -y sshpass
          
          # 创建临时目录用于组织文件
          mkdir -p ./upload-temp
          
          # 复制Windows文件（exe先上传）
          echo "准备Windows文件..."
          cp ./artifacts/windows/*.exe ./upload-temp/ 2>/dev/null || echo "未找到Windows exe文件"
          
          # 复制macOS文件（dmg和zip先上传）
          echo "准备macOS文件..."
          cp ./artifacts/macos/*.dmg ./upload-temp/ 2>/dev/null || echo "未找到macOS dmg文件"
          cp ./artifacts/macos/*.zip ./upload-temp/ 2>/dev/null || echo "未找到macOS zip文件"
          
          # 先上传非yml文件
          if [ -n "$(ls -A ./upload-temp/)" ]; then
            echo "上传非yml文件到服务器..."
            sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no -r ./upload-temp/* "$SERVER_USER@$SERVER_HOST:$SERVER_PATH"
          fi
          
          # 最后上传yml文件
          echo "准备yml配置文件..."
          mkdir -p ./yml-files
          cp ./artifacts/windows/latest.yml ./yml-files/ 2>/dev/null || echo "未找到Windows latest.yml"
          cp ./artifacts/macos/latest-mac.yml ./yml-files/ 2>/dev/null || echo "未找到macOS latest-mac.yml"
          
          if [ -n "$(ls -A ./yml-files/)" ]; then
            echo "上传yml配置文件到服务器..."
            sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no -r ./yml-files/* "$SERVER_USER@$SERVER_HOST:$SERVER_PATH"
          fi
          
          echo "✓ 文件上传完成"
